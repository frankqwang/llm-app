name: character
display_name: 人物主线
target_duration_sec: 50
shot_pace: medium
suitable_when: |
  - 至少有 1 个 person_id 出现在 >= 30% 的素材里
  - 该人物在事件中跨越多个场景/时间段
  - 适合给特定的人做小记录（孩子的一天、伴侣旅行回忆）
prompt_hints: |
  选片偏向：以单一主角（出现频率最高的 person_id）为主轴
  - 开场：人物入场镜头（远景或侧脸）
  - 中段：人物在不同场景的特写、动作、表情
  - 收尾：人物的剪影、背影、或合影
  节奏：单镜头 2-4 秒，留情绪空间
  字幕：以第二人称或第一人称（"那天的你 / 我们走了很远"）
  BGM 风格：温情、抒情、人声可有可无
  必须包含：至少 60% 镜头里有主角，避免主角消失太久
