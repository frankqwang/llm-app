name: recap
display_name: 回顾型
target_duration_sec: 60
shot_pace: medium
suitable_when: |
  - 事件时间跨度长（>= 24 小时，如多日旅行）
  - 或 LLM 在多个事件聚合时使用（年度回顾、季度回顾）
  - 素材跨越多个 location 或多天
prompt_hints: |
  选片偏向：每个时间段（按天/按半天）选 2-3 个最有代表性的镜头
  - 强调时间流逝的感觉（朝→暮、晴→雨、城市→自然）
  节奏：单镜头 2-3 秒，节奏稳但有起伏
  字幕：必有时间地点字幕（"Day 1 / 杭州"、"清晨 / 山顶"）
  字幕位置：左下角小字
  BGM 风格：怀旧、温暖、有故事感
  必须包含：开头有"序章"感的镜头，中段有清晰的时间分段，结尾有总结感
