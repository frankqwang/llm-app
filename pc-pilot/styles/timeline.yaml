name: timeline
display_name: 时间流水
target_duration_sec: 60
shot_pace: medium
suitable_when: |
  - 任何素材都适用，是兜底风格
  - 事件有明确的时间发展（早→晚、出发→抵达→返程）
  - 用户想完整回顾
prompt_hints: |
  选片偏向：按 EXIF 时间均匀展开，覆盖整个事件的开头-中段-结尾
  节奏：单镜头 2-3 秒，节奏稳定
  字幕：可选时间地点字幕（"清晨 6 点 / 抵达"），文字简洁
  BGM 风格：温柔、轻快、不抢戏
  必须包含：开场镜头（事件最早）+ 收尾镜头（事件最晚）
