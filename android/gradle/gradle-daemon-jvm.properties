# Gradle Daemon Toolchain spec (introduced in Gradle 8.10).
# Tells Gradle which JVM the daemon must run on, portably across machines.
#
# Why JDK 21: LiteRT-LM 0.11.0+ ships Java 21 class files, so KAPT
# (used by Hilt's annotation processor) needs JDK 21 to consume them.
# JDK 17 cannot read class file version 65.
#
# How it resolves on each machine:
#   1. Auto-discovers an installed JDK 21 from Adoptium (standard install paths)
#   2. If not found and auto-download is enabled, downloads one from Adoptium
toolchainVersion=21
toolchainVendor=ADOPTIUM
