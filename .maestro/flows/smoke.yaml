# End-to-end smoke test for VlogPilot.
# Validates: app launches, all 4 bottom tabs render, key copy is visible.

appId: com.google.aiedge.gallery
name: smoke
tags:
  - smoke
---
- launchApp:
    clearState: false
    stopApp: true

- assertVisible: "VlogPilot"

- assertVisible: "作品"
- assertVisible: "对话"
- assertVisible: "相册"
- assertVisible: "设置"

- assertVisible: "作品"

- tapOn: "对话"
- assertVisible: "和 AI 聊聊你想做什么..."

- tapOn: "相册"
- assertVisible: "相册"
- assertVisible: "全部"
- assertVisible: "视频"
- assertVisible: "照片"

- tapOn: "设置"
- assertVisible: "视频设置"
- assertVisible: "想做什么样的视频？"

- tapOn: "作品"
- assertVisible: "作品"
