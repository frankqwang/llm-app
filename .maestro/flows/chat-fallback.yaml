# Verifies the "no silent failure" guarantee in Chat.
# On a clean device with no imported model, a generation command should still
# produce a visible model-missing reply instead of dead air.

appId: com.google.aiedge.gallery
name: chat-fallback
tags:
  - regression
---
- launchApp:
    clearState: false

- tapOn: "对话"
- assertVisible: "和 AI 聊聊你想做什么..."

- tapOn:
    text: "和 AI 聊聊你想做什么..."
- inputText: "帮我做一条这周的旅行 vlog"
- tapOn:
    text: "发送"
    optional: true
- tapOn:
    id: "发送"
    optional: true

- assertVisible: "帮我做一条这周的旅行 vlog"
- extendedWaitUntil:
    visible: "可用模型"
    timeout: 5000
